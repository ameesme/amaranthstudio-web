<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>amaranth studio</title>
        <meta
            name="description"
            content="eindhoven-based creative engineering, workshop and dance school."
        />
        <meta name="theme-color" content="#FFFFFF" />
        <meta name="robots" content="index,follow" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="amaranth studio" />
        <meta
            property="og:description"
            content="eindhoven-based creative engineering, workshop and dance school."
        />
        <meta property="og:locale" content="en_nl" />
        <style>
            :root {
                --size: 250px;
                --text-size: 500px;
                --marquee-duration: 130s;
                --background: #000;
                --foreground: #fff;
                --brand: #f2385a;
                --font-bold:
                    "PP Neue Montreal Bold", "PP Neue Montreal Book", sans-serif;
                --font: "PP Neue Montreal Book", sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            html {
                margin: 0;
                background: var(--background);
                overflow: hidden;
                width: 100%;
                height: 100%;
            }

            body {
                margin: 0;
                min-height: 100%;
                max-height: 100lvh;
                display: grid;
                place-items: center;
                background: var(--background);
                color: var(--foreground);
                overflow: hidden;
                transform-origin: 50% 50%;
                /*will-change: transform;*/
            }

            .orb {
                position: fixed;
                top: 50%;
                left: 50%;
                width: var(--size);
                height: var(--size);
                transform: translate(-50%, -50%);
                transform-origin: center;
                border-radius: var(--size);
                animation:
                    intro-expand cubic-bezier(1, 0, 0.89, 0.2) 2000ms 1 forwards,
                    intro-border-radius cubic-bezier(1, 0, 0.89, 0.2) 2000ms 1
                        forwards;
                overflow: hidden;
                border: 1px solid white;
                background: white;
            }

            .orb-shell {
                position: absolute;
                inset: 0;
                transform-origin: center;
                overflow: hidden;
                border-radius: var(--size);
                animation: intro-border-radius cubic-bezier(1, 0, 0.89, 0.2)
                    2000ms 1 forwards;
            }

            .text-box {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(var(--rotation));
                transform-origin: center;
                mix-blend-mode: difference;
                animation: spin-rotate var(--spin-duration, 180s) linear
                    infinite;
                z-index: 1;
            }

            .marquee {
                display: flex;
                overflow: hidden;
                white-space: nowrap;
                width: 100%;
                animation: shell-breathe 26s ease-in-out infinite;
            }

            .marquee__item {
                flex-shrink: 0;
                min-width: max-content;
                color: var(--foreground);
                font-family: var(--font-bold);
                font-size: var(--text-size);
                font-weight: 700;
                line-height: 1;

                text-transform: lowercase;
                animation-duration: var(--marquee-duration);
                animation-iteration-count: infinite;
                animation-name: marquee-content;
                animation-timing-function: linear;
                animation-delay: var(--marquee-offset, 0s);
                will-change: transform;
                user-select: none;
                cursor: default;
            }

            @keyframes marquee-content {
                from {
                    transform: translate3d(0, 0, 0);
                }
                to {
                    transform: translate3d(-100%, 0, 0);
                }
            }

            @keyframes spin-rotate {
                from {
                    transform: translate(-50%, -50%) rotate(var(--rotation));
                }
                to {
                    transform: translate(-50%, -50%)
                        rotate(calc(var(--rotation) + 360deg));
                }
            }

            @keyframes intro-expand {
                0% {
                    width: var(--size);
                    height: var(--size);
                    border-width: 1px;
                }
                70% {
                    width: 150vw;
                    height: 150vh;
                    border-width: 0;
                }
                100% {
                    width: 100vw;
                    height: 100vh;
                    border-width: 0;
                }
            }

            @keyframes intro-border-radius {
                0% {
                    border-radius: var(--size);
                }
                70% {
                    border-radius: 75vmax;
                }
                100% {
                    border-radius: 0;
                }
            }

            @keyframes shell-breathe {
                from {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.3);
                }
                to {
                    transform: scale(1);
                }
            }

            .brand-text {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .subtext {
                position: fixed;
                bottom: 69px;
                left: 50%;
                transform: translateX(-50%);
                margin: 0;
                width: calc(100vw - 120px);
                max-width: 350px;
                text-align: center;
                color: var(--foreground);
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.06em;
                line-height: 1.2;
                text-transform: uppercase;
                mix-blend-mode: difference;
            }

            /* I'll pay for the fonts I promise */
            @font-face {
                font-family: "PP Neue Montreal Book";
                font-style: normal;
                font-weight: normal;
                src:
                    local("PP Neue Montreal Book"),
                    url("fonts/ppneuemontreal-book.woff") format("woff");
            }

            @font-face {
                font-family: "PP Neue Montreal Bold";
                font-style: normal;
                font-weight: normal;
                src:
                    local("PP Neue Montreal Bold"),
                    url("fonts/ppneuemontreal-bold.woff") format("woff");
            }
        </style>
    </head>
    <body>
        <div class="orb">
            <div class="orb-shell">
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
            </div>
        </div>
        <p class="subtext">
            eindhoven-based creative engineering, workshop and dance school.
        </p>
        <script>
            const marqueeSeconds =
                parseFloat(
                    getComputedStyle(document.documentElement).getPropertyValue(
                        "--marquee-duration",
                    ),
                ) || 130;

            const boxes = [...document.querySelectorAll(".text-box")];

            const randomizeMarqueeState = (
                box,
                includeSpinDuration = false,
            ) => {
                box.style.setProperty(
                    "--rotation",
                    `${Math.random() * 360}deg`,
                );
                box.style.setProperty(
                    "--marquee-offset",
                    `${-(Math.random() * marqueeSeconds)}s`,
                );

                if (includeSpinDuration) {
                    box.style.setProperty(
                        "--spin-duration",
                        `${150 + Math.random() * 120}s`,
                    );
                }
            };

            boxes.forEach((box) => randomizeMarqueeState(box, true));
            setInterval(() => {
                boxes.forEach((box) => randomizeMarqueeState(box));
            }, 4000);
        </script>
    </body>
</html>
