<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>amaranth studio</title>
        <meta
            name="description"
            content="eindhoven-based creative engineering, workshop and dance school."
        />
        <meta name="theme-color" content="#FFFFFF" />
        <meta name="robots" content="index,follow" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="amaranth studio" />
        <meta
            property="og:description"
            content="eindhoven-based creative engineering, workshop and dance school."
        />
        <meta property="og:locale" content="en_nl" />
        <style>
            :root {
                --size: 250px;
                --text-size: 500px;
                --marquee-duration: 130s;
                --background: #ddd;
                --foreground: #000;
                --brand: #f2385a;
                --font-bold:
                    "PP Neue Montreal Bold", "PP Neue Montreal Book", sans-serif;
                --font: "PP Neue Montreal Book", sans-serif;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --background: #111;
                }
            }

            * {
                box-sizing: border-box;
            }

            html {
                margin: 0;
                background: var(--background);
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            html.scrollable {
                overflow: auto;
            }

            body {
                margin: 0;
                min-height: calc(100dvh + 200px);
                display: grid;
                place-items: center;
                background: transparent;
                color: var(--foreground);
                transform-origin: 50% 50%;
            }

            body.locked .orb,
            body.locked .logo,
            body.locked .subtext {
                position: absolute;
            }

            body.locked .orb {
                top: calc(200px + 150px);
                transform: translate(-50%, 0);
            }

            body.locked .logo {
                top: 200px;
            }

            body.locked .subtext {
                top: calc(200px + 100vh - 150px);
                bottom: auto;
            }

            .orb {
                position: fixed;
                top: 50%;
                left: 50%;
                width: var(--size);
                height: var(--size);
                transform: translate(-50%, -50%);
                transform-origin: center;
                border-radius: var(--size);
                animation:
                    intro-expand cubic-bezier(1, 0, 0.89, 0.2) 2000ms 1 forwards,
                    intro-border-radius cubic-bezier(1, 0, 0.89, 0.2) 2000ms 1
                        forwards;
                overflow: hidden;
                transition:
                    width ease 0.2s,
                    height ease 0.2s;
                border: 1px solid black;
                mix-blend-mode: exclusion;
            }

            .orb-shell {
                position: absolute;
                inset: 0;
                transform-origin: center;
                overflow: hidden;
                border-radius: var(--size);
                border: 0px solid white;
                animation: intro-border-radius cubic-bezier(1, 0, 0.89, 0.2)
                    2000ms 1 forwards;
            }

            .text-box {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(var(--rotation));
                transform-origin: center;
                mix-blend-mode: difference;
                animation: spin-rotate var(--spin-duration, 180s) linear
                    infinite;
                z-index: 1;
            }

            .marquee {
                display: flex;
                overflow: hidden;
                white-space: nowrap;
                width: 100%;
                animation: shell-breathe 26s ease-in-out infinite;
            }

            .marquee__item {
                flex-shrink: 0;
                min-width: max-content;
                color: white;
                font-family: var(--font-bold);
                font-size: var(--text-size);
                font-weight: 700;
                line-height: 1;

                text-transform: lowercase;
                animation-duration: var(--marquee-duration);
                animation-iteration-count: infinite;
                animation-name: marquee-content;
                animation-timing-function: linear;
                animation-delay: var(--marquee-offset, 0s);
                will-change: transform;
                user-select: none;
                cursor: default;
            }

            @keyframes marquee-content {
                from {
                    transform: translate3d(0, 0, 0);
                }
                to {
                    transform: translate3d(-100%, 0, 0);
                }
            }

            @keyframes spin-rotate {
                from {
                    transform: translate(-50%, -50%) rotate(var(--rotation));
                }
                to {
                    transform: translate(-50%, -50%)
                        rotate(calc(var(--rotation) + 360deg));
                }
            }

            @keyframes intro-expand {
                0% {
                    width: var(--size);
                    height: var(--size);
                    border-width: 1px;
                }
                70% {
                    width: 150vw;
                    height: 150vh;
                    border-width: 0;
                }
                100% {
                    width: 100vw;
                    height: 100vh;
                    border-width: 0;
                }
            }

            @keyframes intro-border-radius {
                0% {
                    border-radius: var(--size);
                }
                70% {
                    border-radius: 75vmax;
                }
                100% {
                    border-radius: 0;
                }
            }

            @keyframes shell-breathe {
                from {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.3);
                }
                to {
                    transform: scale(1);
                }
            }

            .brand-text {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .logo {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 150px;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: -1;
                opacity: 0;
                mix-blend-mode: difference;
            }

            .logo img {
                width: 400px;
                max-width: calc(100dvw - 100px);
            }

            .subtext {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 150px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin: 0;
                text-align: center;
                color: white;
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.06em;
                line-height: 1.2;
                text-transform: uppercase;
                mix-blend-mode: difference;
            }

            .subtext span {
                max-width: 350px;
            }

            .scroll-indicator {
                display: flex;
                flex-direction: column;
                align-items: center;
                transition: opacity 0.3s ease;
            }

            body.locked .scroll-indicator {
                opacity: 0;
                pointer-events: none;
            }

            .scroll-indicator img {
                width: 20px;
                height: 20px;
                margin-top: -12px;
                opacity: 0;
            }

            html.scrollable .scroll-indicator img {
                animation: chevron-fade 2s ease-in-out infinite;
            }

            .scroll-indicator img:first-child {
                margin-top: 0;
            }

            html.scrollable .scroll-indicator img:nth-child(1) {
                animation-delay: 0s;
            }

            html.scrollable .scroll-indicator img:nth-child(2) {
                animation-delay: 0.4s;
            }

            html.scrollable .scroll-indicator img:nth-child(3) {
                animation-delay: 0.8s;
            }

            @keyframes chevron-fade {
                0%,
                100% {
                    opacity: 0;
                }
                50% {
                    opacity: 1;
                }
            }

            /* I'll pay for the fonts I promise */
            @font-face {
                font-family: "PP Neue Montreal Book";
                font-style: normal;
                font-weight: normal;
                src:
                    local("PP Neue Montreal Book"),
                    url("fonts/ppneuemontreal-book.woff") format("woff");
            }

            @font-face {
                font-family: "PP Neue Montreal Bold";
                font-style: normal;
                font-weight: normal;
                src:
                    local("PP Neue Montreal Bold"),
                    url("fonts/ppneuemontreal-bold.woff") format("woff");
            }
        </style>
    </head>
    <body>
        <div class="logo">
            <img src="images/logo.svg" alt="amaranth" />
        </div>
        <div class="orb">
            <div class="orb-shell">
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
                <div class="text-box">
                    <div class="marquee">
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                        <div class="marquee__item">amaranth studio&nbsp;</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="subtext">
            <span
                >eindhoven-based creative engineering, workshop and dance
                school.</span
            >
            <div class="scroll-indicator">
                <img src="images/chevron-down.svg" alt="" />
                <img src="images/chevron-down.svg" alt="" />
                <img src="images/chevron-down.svg" alt="" />
            </div>
        </div>
        <script>
            if ("scrollRestoration" in history) {
                history.scrollRestoration = "manual";
            }
            window.scrollTo(0, 0);
            requestAnimationFrame(() => window.scrollTo(0, 0));

            const marqueeSeconds =
                parseFloat(
                    getComputedStyle(document.documentElement).getPropertyValue(
                        "--marquee-duration",
                    ),
                ) || 130;

            const boxes = [...document.querySelectorAll(".text-box")];

            const randomizeMarqueeState = (
                box,
                includeSpinDuration = false,
            ) => {
                box.style.setProperty(
                    "--rotation",
                    `${Math.random() * 360}deg`,
                );
                box.style.setProperty(
                    "--marquee-offset",
                    `${-(Math.random() * marqueeSeconds)}s`,
                );

                if (includeSpinDuration) {
                    box.style.setProperty(
                        "--spin-duration",
                        `${150 + Math.random() * 120}s`,
                    );
                }
            };

            boxes.forEach((box) => randomizeMarqueeState(box, true));
            setInterval(() => {
                boxes.forEach((box) => randomizeMarqueeState(box));
            }, 4000);

            const orb = document.querySelector(".orb");
            const orbShell = document.querySelector(".orb-shell");
            const logo = document.querySelector(".logo");
            const subtext = document.querySelector(".subtext");

            const handleScroll = () => {
                const scrollY = window.scrollY;
                const progress = Math.min(scrollY / 200, 1);
                const logoProgress = Math.min(
                    Math.max((scrollY - 100) / 100, 0),
                    1,
                );

                logo.style.opacity = logoProgress;
                logo.style.transform = `translateY(${(1 - logoProgress) * 20}px)`;

                if (progress >= 1) {
                    document.body.classList.add("locked");
                } else {
                    document.body.classList.remove("locked");
                }

                if (progress > 0) {
                    const borderRadius = progress * 48;
                    const borderWidth = progress;

                    orb.style.setProperty(
                        "width",
                        `calc(100dvw - ${progress * 100}px)`,
                        "important",
                    );
                    orb.style.setProperty(
                        "height",
                        `calc(100dvh - ${progress * 300}px)`,
                        "important",
                    );
                    orb.style.setProperty(
                        "border-radius",
                        `${borderRadius}px`,
                        "important",
                    );
                    orbShell.style.setProperty(
                        "border-radius",
                        `${borderRadius}px`,
                        "important",
                    );
                    // orbShell.style.setProperty(
                    //     "border-width",
                    //     `${progress * 1}px`,
                    //     "important",
                    // );
                } else {
                    orb.style.removeProperty("width");
                    orb.style.removeProperty("height");
                    orb.style.removeProperty("border-radius");
                    orbShell.style.removeProperty("border-radius");
                    orbShell.style.removeProperty("border-width");
                }
            };

            window.addEventListener("scroll", handleScroll);

            setTimeout(() => {
                document.documentElement.classList.add("scrollable");
            }, 1000);
        </script>
    </body>
</html>
