<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>amaranth studio</title><meta name="theme-color" content="#FFFFFF" /><style>:root{--size:250px;--text-size:500px;--marquee-duration:300s;--background:#000;--foreground:#fff;--font-bold:"PP Neue Montreal Bold", "PP Neue Montreal Book", sans-serif}*{box-sizing:border-box}html{margin:0;background:var(--background);overflow:hidden;width:100%;height:100%}body{margin:0;min-height:100%;max-height:100lvh;display:grid;place-items:center;background:var(--background);color:var(--foreground);overflow:hidden;transform-origin:50% 50%;will-change:transform;cursor:none}.orb{position:relative;flex-shrink:0}.sphere-shell{position:absolute;inset:0;transform-origin:center;animation:shell-breathe 45s ease-in-out infinite}.orb-stage{position:absolute;top:50%;left:50%;width:150vw;height:150vh;transform:translate(-50%,-50%);transform-origin:center}.orb-mask{position:absolute;inset:0;overflow:hidden;border-radius:50%;background:#fff;border:1px solid #fff}.text-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(var(--rotation));transform-origin:center;mix-blend-mode:difference;animation:spin-rotate var(--spin-duration,600s) linear infinite;z-index:1}.marquee{display:flex;overflow:hidden;white-space:nowrap;width:100%}.marquee__item{flex-shrink:0;min-width:max-content;color:var(--foreground);font-family:var(--font-bold);font-size:var(--text-size);font-weight:700;line-height:1;text-transform:lowercase;animation-duration:var(--marquee-duration);animation-iteration-count:infinite;animation-name:marquee-content;animation-timing-function:linear;animation-delay:var(--marquee-offset,0s);will-change:transform;user-select:none;cursor:none}@keyframes marquee-content{from{transform:translate3d(0,0,0)}to{transform:translate3d(-100%,0,0)}}@keyframes spin-rotate{from{transform:translate(-50%,-50%) rotate(var(--rotation))}to{transform:translate(-50%,-50%) rotate(calc(var(--rotation) + 360deg))}}@keyframes shell-breathe{from{transform:scale(1)}50%{transform:scale(1.3)}to{transform:scale(1)}}@font-face{font-family:'PP Neue Montreal Book';font-style:normal;font-weight:400;src:local('PP Neue Montreal Book'),url(fonts/ppneuemontreal-book.woff) format('woff')}@font-face{font-family:'PP Neue Montreal Bold';font-style:normal;font-weight:400;src:local('PP Neue Montreal Bold'),url(fonts/ppneuemontreal-bold.woff) format('woff')}</style></head><body><div class="orb"><div class="sphere-shell"><div class="orb-stage"><div class="orb-mask"><div class="text-box"><div class="marquee"><div class="marquee__item">amaranth studio&nbsp;</div><div class="marquee__item">amaranth studio&nbsp;</div></div></div><div class="text-box"><div class="marquee"><div class="marquee__item">amaranth studio&nbsp;</div><div class="marquee__item">amaranth studio&nbsp;</div></div></div><div class="text-box"><div class="marquee"><div class="marquee__item">amaranth studio&nbsp;</div><div class="marquee__item">amaranth studio&nbsp;</div></div></div></div></div></div></div><script>const marqueeSeconds=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--marquee-duration",),) || 300;const boxes=[...document.querySelectorAll(".text-box")];const randomizeMarqueeState=(box,includeSpinDuration=false,)=>{box.style.setProperty("--rotation",`${Math.random() * 360}deg`,);box.style.setProperty("--marquee-offset",`${-(Math.random() * marqueeSeconds)}s`,);if (includeSpinDuration){box.style.setProperty("--spin-duration",`${500+Math.random() * 300}s`,)}};boxes.forEach((box)=>randomizeMarqueeState(box,true));setInterval(()=>{boxes.forEach((box)=>randomizeMarqueeState(box))},15000);</script></body></html>
