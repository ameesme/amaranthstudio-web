<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amaranth Studios</title>
    <style>
      :root {
        --size: 250px;
        --text-size: 500px;
        --marquee-duration: 130s;
        --background: #000;
        --foreground: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        overflow: hidden;
      }

      .lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
      }

      .square {
        position: relative;
        width: var(--size);
        height: var(--size);
        flex-shrink: 0;
      }

      .square-clip {
        position: absolute;
        top: 50%;
        left: 50%;
        width: var(--size);
        height: var(--size);
        overflow: hidden;
        transform: translate(-50%, -50%);
        transform-origin: center;
        pointer-events: none;
        animation: intro-expand 1800ms cubic-bezier(0.22, 1, 0.36, 1) 250ms 1
          forwards;
      }

      .text-box {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 280vmax;
        transform: translate(-50%, -50%) rotate(var(--rotation));
        transform-origin: center;
        mix-blend-mode: difference;
        animation: spin-rotate var(--spin-duration, 180s) linear infinite;
        pointer-events: none;
      }

      .marquee {
        display: flex;
        overflow: hidden;
        white-space: nowrap;
        width: 100%;
        pointer-events: none;
      }

      .marquee__item {
        flex-shrink: 0;
        min-width: max-content;
        color: var(--foreground);
        font-family: "PP Nueu Montreal Bold", "PP Neue Montreal Bold",
          "PP Nueu Montreal", "PP Neue Montreal", sans-serif;
        font-size: var(--text-size);
        font-weight: 700;
        line-height: 1;
        text-transform: lowercase;
        animation-duration: var(--marquee-duration);
        animation-iteration-count: infinite;
        animation-name: marquee-content;
        animation-timing-function: linear;
        animation-delay: var(--marquee-offset, 0s);
        will-change: transform;
        pointer-events: none;
        user-select: none;
        cursor: default;
      }

      @keyframes marquee-content {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-100%, 0, 0);
        }
      }

      @keyframes intro-expand {
        from {
          width: var(--size);
          height: var(--size);
        }
        to {
          width: 160vmax;
          height: 160vmax;
        }
      }

      @keyframes spin-rotate {
        from {
          transform: translate(-50%, -50%) rotate(var(--rotation));
        }
        to {
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) + 360deg));
        }
      }

      .wordmark {
        margin: 0;
        color: var(--foreground);
        font-family: "PP Nueu Montreal Bold", "PP Neue Montreal Bold",
          "PP Nueu Montreal", "PP Neue Montreal", sans-serif;
        font-size: 84px;
        font-weight: 700;
        line-height: 0.72;
        text-transform: lowercase;
      }

      .wordmark span {
        display: block;
      }

      .brand-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        mix-blend-mode: difference;
      }

      .subtext {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        margin: 0;
        width: calc(100vw - 40px);
        text-align: center;
        color: var(--foreground);
        font-family: "PP Nueu Montreal", "PP Neue Montreal", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        line-height: 1.2;
        text-transform: uppercase;
        mix-blend-mode: difference;
      }
    </style>
  </head>
  <body>
    <main class="lockup">
      <div class="square">
        <div class="square-clip">
          <div class="text-box">
            <div class="marquee">
              <div class="marquee__item">amaranth studios&nbsp;</div>
              <div class="marquee__item">amaranth studios&nbsp;</div>
            </div>
          </div>
          <div class="text-box">
            <div class="marquee">
              <div class="marquee__item">amaranth studios&nbsp;</div>
              <div class="marquee__item">amaranth studios&nbsp;</div>
            </div>
          </div>
          <div class="text-box">
            <div class="marquee">
              <div class="marquee__item">amaranth studios&nbsp;</div>
              <div class="marquee__item">amaranth studios&nbsp;</div>
            </div>
          </div>
        </div>
      </div>
      <div class="brand-text">
        <p class="wordmark"><span>amaranth</span><span>studios</span></p>
      </div>
    </main>
    <p class="subtext">
      creative engineering &middot; experimental workshop &middot; dance school
    </p>
    <script>
      const marqueeSeconds =
        parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue(
            "--marquee-duration"
          )
        ) || 130;

      document.querySelectorAll(".text-box").forEach((box) => {
        box.style.setProperty("--rotation", `${Math.random() * 360}deg`);
        box.style.setProperty("--spin-duration", `${150 + Math.random() * 120}s`);
        box.style.setProperty(
          "--marquee-offset",
          `${-(Math.random() * marqueeSeconds)}s`
        );
      });
    </script>
  </body>
</html>
