<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>amaranth studio</title>
        <meta
            name="description"
            content="eindhoven-based creative engineering studio, experimental workshop, and dance school."
        />
        <meta name="theme-color" content="#000000" />
        <meta name="robots" content="index,follow" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="amaranth studio" />
        <meta
            property="og:description"
            content="eindhoven-based creative engineering studio, experimental workshop, and dance school."
        />
        <meta property="og:locale" content="en_nl" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="amaranth studio" />
        <meta
            name="twitter:description"
            content="eindhoven-based creative engineering studio, experimental workshop, and dance school."
        />
        <style>
            :root {
                --size: 250px;
                --text-size: 500px;
                --marquee-duration: 130s;
                --background: #000;
                --foreground: #fff;
                --brand: #f2385a;
            }

            * {
                box-sizing: border-box;
            }

            html {
                margin: 0;
                background: var(--background);
                overflow: hidden;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: var(--background);
                color: var(--foreground);
                overflow: hidden;
                transform-origin: 50% 50%;
                will-change: transform;
            }

            .lockup {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 26px;
            }

            .square {
                position: relative;
                width: var(--size);
                height: var(--size);
                flex-shrink: 0;
            }

            .sphere-shell {
                position: absolute;
                inset: 0;
                transform-origin: center;
                pointer-events: none;
                animation: shell-breathe 4s ease-in-out 750ms infinite;
            }

            .square-clip {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 160vmax;
                height: 160vmax;
                overflow: hidden;
                transform: translate(-50%, -50%);
                transform-origin: center;
                pointer-events: none;
                border-radius: 300px;
                border: 1px solid white;
                animation: intro-compact 850ms cubic-bezier(0.22, 1, 0.36, 1)
                    1500ms 1 forwards;
            }

            .text-box {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 280vmax;
                transform: translate(-50%, -50%) rotate(var(--rotation));
                transform-origin: center;
                mix-blend-mode: difference;
                animation: spin-rotate var(--spin-duration, 180s) linear
                    infinite;
                pointer-events: none;
            }

            .marquee {
                display: flex;
                overflow: hidden;
                white-space: nowrap;
                width: 100%;
                pointer-events: none;
            }

            .marquee__item {
                flex-shrink: 0;
                min-width: max-content;
                color: var(--foreground);
                font-family:
                    "PP Neue Montreal Bold", "PP Neue Montreal", sans-serif;
                font-size: var(--text-size);
                font-weight: 700;
                line-height: 1;

                text-transform: lowercase;
                animation-duration: var(--marquee-duration);
                animation-iteration-count: infinite;
                animation-name: marquee-content;
                animation-timing-function: linear;
                animation-delay: var(--marquee-offset, 0s);
                will-change: transform;
                pointer-events: none;
                user-select: none;
                cursor: default;
            }

            @keyframes marquee-content {
                from {
                    transform: translate3d(0, 0, 0);
                }
                to {
                    transform: translate3d(-100%, 0, 0);
                }
            }

            @keyframes spin-rotate {
                from {
                    transform: translate(-50%, -50%) rotate(var(--rotation));
                }
                to {
                    transform: translate(-50%, -50%)
                        rotate(calc(var(--rotation) + 360deg));
                }
            }

            @keyframes intro-compact {
                from {
                    width: 160vmax;
                    height: 160vmax;
                }
                to {
                    width: var(--size);
                    height: var(--size);
                }
            }

            @keyframes shell-breathe {
                from {
                    transform: scale(1);
                }
                50% {
                    transform: scale(0.9);
                }
                to {
                    transform: scale(1);
                }
            }

            .wordmark {
                margin: 0;
                color: var(--foreground);
                font-family:
                    "PP Neue Montreal Bold", "PP Neue Montreal", sans-serif;
                font-size: 84px;
                font-weight: 700;
                line-height: 0.72;
                text-transform: lowercase;
            }

            .wordmark span {
                display: block;
            }

            .brand-text {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                mix-blend-mode: difference;
            }

            .subtext {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%);
                margin: 0;
                width: calc(100vw - 40px);
                text-align: center;
                color: var(--foreground);
                font-family: "PP Neue Montreal", sans-serif;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.06em;
                line-height: 1.2;
                text-transform: uppercase;
                mix-blend-mode: difference;
            }
        </style>
    </head>
    <body>
        <main class="lockup">
            <div class="square">
                <div class="sphere-shell">
                    <div class="square-clip">
                        <div class="text-box">
                            <div class="marquee">
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                            </div>
                        </div>
                        <div class="text-box">
                            <div class="marquee">
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                            </div>
                        </div>
                        <div class="text-box">
                            <div class="marquee">
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                                <div class="marquee__item">
                                    amaranth studio&nbsp;
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="brand-text">
                <p class="wordmark">amaranth</p>
            </div>
        </main>
        <p class="subtext">
            CREATIVE ENGINEERING &middot; WORKSHOP &middot; DANCE SCHOOL
        </p>
        <script>
            const marqueeSeconds =
                parseFloat(
                    getComputedStyle(document.documentElement).getPropertyValue(
                        "--marquee-duration",
                    ),
                ) || 130;

            const boxes = [...document.querySelectorAll(".text-box")];

            const randomizeMarqueeState = (
                box,
                includeSpinDuration = false,
            ) => {
                box.style.setProperty(
                    "--rotation",
                    `${Math.random() * 360}deg`,
                );
                box.style.setProperty(
                    "--marquee-offset",
                    `${-(Math.random() * marqueeSeconds)}s`,
                );

                if (includeSpinDuration) {
                    box.style.setProperty(
                        "--spin-duration",
                        `${150 + Math.random() * 120}s`,
                    );
                }
            };

            boxes.forEach((box) => randomizeMarqueeState(box, true));
            setInterval(() => {
                boxes.forEach((box) => randomizeMarqueeState(box));
            }, 4000);
        </script>
    </body>
</html>
