lass="marquee__item">amaranth studio&nbsp;</div><div class="marquee__item">amaranth studio&nbsp;</div></div></div></div></div></div></main><p class="subtext">eindhoven-based creative engineering, workshop and dance school. </p><script>const marqueeSeconds=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--marquee-duration",),) || 130;const boxes=[...document.querySelectorAll(".text-box")];const randomizeMarqueeState=(box,includeSpinDuration=false,)=>{box.style.setProperty("--rotation",`${Math.random() * 360}deg`,);box.style.setProperty("--marquee-offset",`${-(Math.random() * marqueeSeconds)}s`,);if (includeSpinDuration){box.style.setProperty("--spin-duration",`${150+Math.random() * 120}s`,)}};boxes.forEach((box)=>randomizeMarqueeState(box,true));setInterval(()=>{boxes.forEach((box)=>randomizeMarqueeState(box))},4000);</script></body></html>
