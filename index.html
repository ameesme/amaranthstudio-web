:700;line-height:1;text-transform:lowercase;animation-duration:var(--marquee-duration);animation-iteration-count:infinite;animation-name:marquee-content;animation-timing-function:linear;animation-delay:var(--marquee-offset,0s);will-change:transform;user-select:none;cursor:default}@keyframes marquee-content{from{transform:translate3d(0,0,0)}to{transform:translate3d(-100%,0,0)}}@keyframes spin-rotate{from{transform:translate(-50%,-50%) rotate(var(--rotation))}to{transform:translate(-50%,-50%) rotate(calc(var(--rotation) + 360deg))}}@keyframes intro-expand{from{width:var(--size);height:var(--size)}to{width:150vw;height:150vh}}@keyframes shell-breathe{from{transform:scale(1)}50%{transform:scale(1.3)}to{transform:scale(1)}}.brand-text{display:flex;flex-direction:column;align-items:center;text-align:center}.subtext{position:fixed;bottom:69px;left:50%;transform:translateX(-50%);margin:0;width:calc(100vw - 120px);max-width:350px;text-align:center;color:var(--foreground);font-family:var(--font);font-size:12px;font-weight:500;letter-spacing:.06em;line-height:1.2;text-transform:uppercase;mix-blend-mode:difference}</style><div class=orb><div class=sphere-shell><div class=orb-stage><div class=orb-mask><div class=text-box><div class=marquee><div class=marquee__item>amaranth studio </div><div class=marquee__item>amaranth studio </div></div></div><div class=text-box><div class=marquee><div class=marquee__item>amaranth studio </div><div class=marquee__item>amaranth studio </div></div></div><div class=text-box><div class=marquee><div class=marquee__item>amaranth studio </div><div class=marquee__item>amaranth studio </div></div></div></div></div></div><p class=subtext>eindhoven-based creative engineering studio, workshop and dance school.</p><script>const marqueeSeconds =
                parseFloat(
                    getComputedStyle(document.documentElement).getPropertyValue(
                        "--marquee-duration",
                    ),
                ) || 130;

            const boxes = [...document.querySelectorAll(".text-box")];

            const randomizeMarqueeState = (
                box,
                includeSpinDuration = false,

                box.style.setProperty(

                    box.style.setProperty(

                        `${150 + Math.random() * 120}s`,
                    );
                }
            };

            boxes.forEach((box) => randomizeMarqueeState(box, true));
            setInterval(() => {
                boxes.forEach((box) => randomizeMarqueeState(box));
            }, 4000);</script>
